services:
  discord-kiwi:
    build: .
    container_name: discord-kiwi
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - discord-kiwi-data:/app/data
    environment:
      - VOICE_HUB_STORE=/app/data/voiceHubs.json
    stdin_open: true
    tty: true

volumes:
  discord-kiwi-data:
